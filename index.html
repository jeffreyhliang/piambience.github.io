<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #particles {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    z-index: 1;
  }
  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
    z-index: 2;
  }
  #mood-label {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 0.5s;
    z-index: 2;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="particles"></canvas>
<div id="mood-label"></div>
<div id="info">move mouse or touch to shift mood<br>X-axis: attitude (← dark, → bright) &nbsp; Y-axis: energy (↓ calm, ↑ energetic)</div>

<script src="src/assets/ToneRaw.js"></script>
<script type="module" src="src/assets/js/main.ts"></script>
</body>
</html>
