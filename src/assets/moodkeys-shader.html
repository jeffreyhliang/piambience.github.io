<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 13px;
    letter-spacing: 0.5px;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
  }
  #mood-label {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="mood-label"></div>
<div id="info">move mouse or touch to shift mood<br>X-axis: (dark ↔ bright) &nbsp; Y-axis: arousal (calm ↔ energetic)</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js">  
</script>
<script>
const synth = new Tone.PolySynth(Tone.Synth).toDestination();

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl');
const label = document.getElementById('mood-label');

// Mood state with smoothing
let targetX = 0.5, targetY = 0.35;
let smoothX = 0.5, smoothY = 0.35;

const vSrc = `attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const fSrc = `
precision highp float;
uniform float t;
uniform vec2 r;
uniform vec2 mood;

// Simplex-ish noise
vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec2 mod289(vec2 x){return x-floor(x*(1./289.))*289.;}
vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}

float snoise(vec2 v){
  const vec4 C=vec4(.211324865405187,.366025403784439,-.577350269189626,.024390243902439);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1;
  i1=(x0.x>x0.y)?vec2(1,0):vec2(0,1);
  vec4 x12=x0.xyxy+C.xxzz;
  x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0,i1.y,1.))+i.x+vec3(0,i1.x,1.));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m;m=m*m;
  vec3 x=2.*fract(p*C.www)-1.;
  vec3 h=abs(x)-.5;
  vec3 ox=floor(x+.5);
  vec3 a0=x-ox;
  m*=1.79284291400159-.85373472095314*(a0*a0+h*h);
  vec3 g;
  g.x=a0.x*x0.x+h.x*x0.y;
  g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}

float fbm(vec2 p, float speed){
  float f=0.;
  f+=0.5000*snoise(p*1.0+t*speed);
  f+=0.2500*snoise(p*2.0-t*speed*1.3);
  f+=0.1250*snoise(p*4.0+t*speed*0.7);
  f+=0.0625*snoise(p*8.0-t*speed*0.9);
  return f;
}

vec3 palette(float valence, float arousal, float n){
  // Low valence: deep blues, purples, teals
  // High valence: warm gold, amber, soft rose
  // Low arousal: muted, darker
  // High arousal: brighter, more saturated
  
  vec3 coldA = vec3(0.05, 0.05, 0.18);  // deep navy
  vec3 coldB = vec3(0.12, 0.08, 0.28);  // purple
  vec3 coldC = vec3(0.06, 0.16, 0.22);  // teal
  
  vec3 warmA = vec3(0.28, 0.15, 0.06);  // amber
  vec3 warmB = vec3(0.30, 0.10, 0.12);  // rose
  vec3 warmC = vec3(0.25, 0.20, 0.05);  // gold
  
  vec3 cold = mix(mix(coldA, coldB, n), coldC, sin(n*3.14)*.5+.5);
  vec3 warm = mix(mix(warmA, warmB, n), warmC, sin(n*3.14+1.)*.5+.5);
  
  vec3 base = mix(cold, warm, valence);
  
  // Arousal affects brightness and saturation
  float brightness = mix(0.6, 1.4, arousal);
  base *= brightness;
  
  return base;
}

void main(){
  vec2 uv = gl_FragCoord.xy / r;
  vec2 p = (gl_FragCoord.xy - r*.5) / min(r.x, r.y);
  
  float valence = mood.x;
  float arousal = mood.y;
  
  // Speed driven by arousal
  float speed = mix(0.03, 0.12, arousal);
  
  // Layered noise fields
  float n1 = fbm(p * 1.5 + vec2(0.0, 0.0), speed);
  float n2 = fbm(p * 1.2 + vec2(5.2, 1.3), speed * 0.7);
  float n3 = fbm(p * 0.8 + vec2(2.1, 7.8), speed * 0.5);
  
  // Combine noise for organic flow
  float flow = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;
  
  // Warp coordinates with noise for liquid feel
  vec2 warped = p + vec2(n1, n2) * mix(0.15, 0.4, arousal);
  float mainNoise = fbm(warped * 1.3, speed * 0.8);
  
  // Build color from palette
  float colorIdx = mainNoise * 0.5 + 0.5;
  vec3 col = palette(valence, arousal, colorIdx);
  
  // Add soft glow spots (bokeh-like)
  for(int i = 0; i < 4; i++){
    float fi = float(i);
    vec2 center = vec2(
      sin(t * speed * 2.0 + fi * 1.7) * 0.4,
      cos(t * speed * 1.5 + fi * 2.3) * 0.3
    );
    float dist = length(warped - center);
    float glow = exp(-dist * mix(3.0, 6.0, arousal)) * mix(0.08, 0.2, valence);
    
    vec3 glowCol = palette(valence, arousal, fi * 0.25 + flow * 0.3);
    col += glowCol * glow * mix(1.5, 3.0, arousal);
  }
  
  // Subtle vignette
  float vig = 1.0 - dot(uv - 0.5, uv - 0.5) * 1.2;
  col *= vig;
  
  // Gentle grain for texture
  float grain = (snoise(gl_FragCoord.xy * 0.5 + t * 100.0) * 0.02);
  col += grain;
  
  // Breathing pulse tied to arousal
  float breath = sin(t * mix(0.3, 0.8, arousal)) * mix(0.02, 0.06, arousal);
  col *= 1.0 + breath;
  
  // Tone mapping
  col = col / (col + 0.8);
  col = pow(col, vec3(0.95));
  
  gl_FragColor = vec4(col, 1.0);
}
`;

function createShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, createShader(vSrc, gl.VERTEX_SHADER));
gl.attachShader(prog, createShader(fSrc, gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const pAttr = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pAttr);
gl.vertexAttribPointer(pAttr, 2, gl.FLOAT, false, 0, 0);

const uT = gl.getUniformLocation(prog, 't');
const uR = gl.getUniformLocation(prog, 'r');
const uMood = gl.getUniformLocation(prog, 'mood');

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// Mouse/touch → mood
function updateTarget(clientX, clientY) {
  targetX = clientX / window.innerWidth;
  targetY = 1.0 - (clientY / window.innerHeight);
}

window.addEventListener('mousemove', e => updateTarget(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  e.preventDefault();
  updateTarget(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener('touchstart', e => {
  updateTarget(e.touches[0].clientX, e.touches[0].clientY);
});

//const notes = ['C3','D3','E3','G3','A3','C4','D4','E4','G4','A4','C5','D5','E5'];
const notes = [['C3','E3','G3'],['D3','F3','A3'],['E3','G3','B3'],['F3','A3','C4'],['G3','B3','D4'],['A3','C4','E4'],['B3','D4','F4'],['C4','E4','G4'],['D4','F4','A4'],['E4','G4','B4'],['F4','A4','C5'],['G4','B4','D5'],['A4','C5','E5']];

window.addEventListener('click', async e => {
  await Tone.start();
  const index = Math.floor(smoothY * (notes.length - 1)); // Y axis = pitch
  synth.triggerAttackRelease(notes[index], '8n', undefined, smoothX);
});

function getMoodLabel(v, a) {
  if (v > 0.6 && a > 0.6) return 'euphoric';
  if (v > 0.6 && a < 0.4) return 'serene';
  if (v < 0.4 && a > 0.6) return 'intense';
  if (v < 0.4 && a < 0.4) return 'melancholic';
  if (v > 0.55 && a > 0.45 && a < 0.6) return 'hopeful';
  if (v < 0.45 && a > 0.4 && a < 0.6) return 'contemplative';
  if (a < 0.3) return 'dreamy';
  if (a > 0.7) return 'restless';
  return 'reflective';
}

const start = Date.now();
function frame() {
  // Smooth toward target (exponential ease)
  const ease = 0.03;
  smoothX += (targetX - smoothX) * ease;
  smoothY += (targetY - smoothY) * ease;

  const elapsed = (Date.now() - start) / 1000;
  gl.uniform1f(uT, elapsed);
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform2f(uMood, smoothX, smoothY);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  label.textContent = getMoodLabel(smoothX, smoothY);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
